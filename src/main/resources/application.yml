spring:
  application:
    name: retail-order-management-api
  profiles:
    default: dev
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:changeit-changeit-changeit-changeit}
      issuer: ${APP_SECURITY_JWT_ISSUER:retail-order-management-api}
      expiration-minutes: ${APP_SECURITY_JWT_EXPIRATION_MINUTES:60}
    bootstrap-user:
      username: ${APP_SECURITY_BOOTSTRAP_USERNAME:admin}
      password: ${APP_SECURITY_BOOTSTRAP_PASSWORD:admin123}
      role: ${APP_SECURITY_BOOTSTRAP_ROLE:ADMIN}
